name: Dayroll
options:
  bundleIdPrefix: com.sunpebble
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 62HCT6Q83X
    MARKETING_VERSION: 0.5.0 # x-release-please-version
    CURRENT_PROJECT_VERSION: 1
targets:
  Dayroll:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.dayroll
        CODE_SIGN_ENTITLEMENTS: App/Dayroll.entitlements
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Dayroll
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes: [dayroll]
    dependencies:
      - target: DayrollWidget
        embed: true
  DayrollWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.dayroll.widget
        CODE_SIGN_ENTITLEMENTS: Widget/DayrollWidget.entitlements
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Dayroll
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  DayrollTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Dayroll.storekit
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Dayroll
  DayrollUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - DayrollUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.dayroll.uitests
    dependencies:
      - target: Dayroll
schemes:
  Dayroll:
    build:
      targets:
        Dayroll: all
        DayrollUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Dayroll.storekit
      commandLineArguments:
        "-pro": false
        "-seedDemo": false
        "-showStats": false
    test:
      targets:
        - DayrollTests
        - DayrollUITests
